name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify app
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        shell: pwsh
        run: |
          python -m venv backend/.venv
          backend\.venv\Scripts\python.exe -m pip install -r backend\requirements-dev.txt

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Run tests
        run: pnpm test

      - name: Build web app
        run: pnpm run build:web

      - name: Run browser smoke
        run: pnpm run test:e2e

  backend-image:
    name: Backend image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --progress=plain -t rankkit-api ./backend

      - name: Run backend image
        run: |
          docker run -d --name rankkit-api-smoke \
            -p 8002:8002 \
            -e ENVIRONMENT=production \
            -e STORE_BACKEND=postgres \
            -e DATABASE_HOST=rankkit-db.example \
            -e DATABASE_PORT=5432 \
            -e DATABASE_NAME=rankkit \
            -e DATABASE_USER=rankkit \
            -e DATABASE_PASSWORD=ci-db-password \
            -e JWT_SECRET=ci-production-secret-with-at-least-32-chars \
            -e ALLOWED_ORIGINS=http://localhost:3000 \
            rankkit-api

          for attempt in $(seq 1 30); do
            if api_body=$(curl --fail --silent http://127.0.0.1:8002/health); then
              if echo "$api_body" | grep -q '"status":"ok"'; then
                exit 0
              fi
            fi
            sleep 1
          done

          docker logs rankkit-api-smoke
          exit 1
        shell: bash

      - name: Stop backend image
        if: always()
        run: docker rm -f rankkit-api-smoke || true

  web-image:
    name: Web image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build web image
        run: docker build --progress=plain -f apps/web/Dockerfile --build-arg NEXT_PUBLIC_API_URL=http://localhost:8002 -t rankkit-web .

      - name: Run web image
        run: |
          docker run -d --name rankkit-web-smoke \
            -p 3001:3000 \
            -e NEXTAUTH_SECRET=ci-production-secret-with-at-least-32-chars \
            -e NEXTAUTH_URL=http://localhost:3001 \
            -e NEXT_PUBLIC_API_URL=http://localhost:8002 \
            -e AUTH_REQUIRED=false \
            rankkit-web

          for attempt in $(seq 1 30); do
            if web_body=$(curl --fail --silent http://127.0.0.1:3001); then
              if echo "$web_body" | grep -q "RankKit"; then
                exit 0
              fi
            fi
            sleep 1
          done

          docker logs rankkit-web-smoke
          exit 1
        shell: bash

      - name: Stop web image
        if: always()
        run: docker rm -f rankkit-web-smoke || true

  local-production-compose:
    name: Local production compose
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate local production compose
        run: docker compose -f compose.production-local.yaml config

      - name: Start local production compose
        run: docker compose -f compose.production-local.yaml up --build --detach

      - name: Smoke local production compose
        run: pwsh -NoLogo -NoProfile -File scripts/smoke-production.ps1 -ApiUrl http://localhost:8002 -WebUrl http://localhost:3000 -MaxAttempts 18 -DelaySeconds 5

      - name: Show local production compose logs
        if: failure()
        run: docker compose -f compose.production-local.yaml logs

      - name: Stop local production compose
        if: always()
        run: docker compose -f compose.production-local.yaml down --volumes

  cdk-synth:
    name: CDK synth
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install infra dependencies
        working-directory: infra
        run: pip install -r requirements.txt

      - name: Synthesize CDK app
        working-directory: infra
        run: npx aws-cdk@2.173.4 synth

  postgres-smoke:
    name: Postgres smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rankkit
          POSTGRES_USER: rankkit
          POSTGRES_PASSWORD: rankkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rankkit -d rankkit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql+asyncpg://rankkit:rankkit@localhost:5432/rankkit

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -r requirements-dev.txt

      - name: Apply migrations
        working-directory: backend
        run: .venv/bin/python -m alembic upgrade head

      - name: Run Postgres adapter smoke
        working-directory: backend
        run: .venv/bin/python -m app.db.smoke
