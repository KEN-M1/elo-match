services:
  rankkit-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rankkit
      POSTGRES_USER: rankkit
      POSTGRES_PASSWORD: rankkit
    volumes:
      - rankkit-production-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankkit -d rankkit"]
      interval: 5s
      timeout: 5s
      retries: 12

  rankkit-migrate:
    build:
      context: ./backend
    command: ["sh", "-c", "python -m alembic upgrade head"]
    environment:
      DATABASE_HOST: rankkit-postgres
      DATABASE_NAME: rankkit
      DATABASE_PASSWORD: rankkit
      DATABASE_USER: rankkit
      ENVIRONMENT: production
      JWT_SECRET: local-production-nextauth-secret-32chars
      STORE_BACKEND: postgres
    depends_on:
      rankkit-postgres:
        condition: service_healthy

  rankkit-api:
    build:
      context: ./backend
    environment:
      ALLOWED_ORIGINS: http://localhost:3000
      DATABASE_HOST: rankkit-postgres
      DATABASE_NAME: rankkit
      DATABASE_PASSWORD: rankkit
      DATABASE_USER: rankkit
      ENVIRONMENT: production
      JWT_SECRET: local-production-nextauth-secret-32chars
      STORE_BACKEND: postgres
    ports:
      - "8002:8002"
    depends_on:
      rankkit-postgres:
        condition: service_healthy
      rankkit-migrate:
        condition: service_completed_successfully

  rankkit-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8002
    environment:
      AUTH_REQUIRED: false
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      NEXT_PUBLIC_API_URL: http://localhost:8002
      NEXTAUTH_SECRET: local-production-nextauth-secret-32chars
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      rankkit-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  rankkit-production-postgres-data:
